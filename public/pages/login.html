<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Library System</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .login-card { background: var(--white); border-radius: var(--radius-xl); padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); text-align: center; border: 1px solid var(--border); }
    .login-logo { margin-bottom: 24px; }
    .login-logo img { height: 48px; }
    .login-card .icon { width: 56px; height: 56px; background: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .login-card h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .login-card .subtitle { color: var(--text-light); font-size: 14px; margin-bottom: 28px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--secondary); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139, 26, 45, 0.1); }
    .login-btn { width: 100%; padding: 14px; margin-top: 8px; background: var(--primary); color: var(--white); border: none; border-radius: var(--radius); font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(139, 26, 45, 0.25); }
    .login-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .error-msg { display: none; background: var(--danger-bg); color: #991B1B; padding: 12px; border-radius: var(--radius); margin-top: 16px; font-size: 14px; font-weight: 500; border: 1px solid #FECACA; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="brand-text">
        <span class="brand-title">Library System</span>
        <span class="brand-subtitle">Check-In / Check-Out Tracking</span>
      </div>
    </a>
    <div class="navbar-nav">
      <a href="/">Home</a>
      <a href="/giris">Check-In / Out</a>
    </div>
  </nav>

  <div class="main">
    <div class="login-card">
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Admin Panel</h1>
      <p class="subtitle">Sign in as staff or admin</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Your username" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="error-msg" id="errorBox"></div>
    </div>
  </div>

  <div class="footer">
    <div>Library Check-In/Out Tracking System</div>
    <div class="footer-right">Developed by: Muhammed Taha CAN &bull; Ilhan Sidal KARADENIZ &bull; Furkan YILMAZ</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var token = localStorage.getItem('token');
      var user = JSON.parse(localStorage.getItem('user') || 'null');
      if (token && user) { redirectByRole(user.role); return; }

      var form = document.getElementById('loginForm');
      var errorBox = document.getElementById('errorBox');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorBox.style.display = 'none';

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        try {
          var res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
          });
          var data = await res.json();

          if (!res.ok) {
            errorBox.textContent = data.error || 'Login failed.';
            errorBox.style.display = 'block';
            return;
          }

          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          redirectByRole(data.user.role);
        } catch (err) {
          errorBox.textContent = 'Could not connect to server.';
          errorBox.style.display = 'block';
        }
      });

      function redirectByRole(role) {
        if (role === 'admin') window.location.href = '/pages/admin.html';
        else window.location.href = '/pages/staff.html';
      }
    });
  </script>
</body>
</html>
