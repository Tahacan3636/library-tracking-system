<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library - QR Code</title>
  <link rel="stylesheet" href="../css/qr.css">
</head>
<body>
  <div class="qr-container">
    <h1 class="qr-title">Library Check-In/Out System</h1>
    <div class="qr-box">
      <div id="qrcode"></div>
    </div>
    <p class="qr-instruction">Scan the QR code to check in or out</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="../js/qr.js"></script>
</body>
</html>
