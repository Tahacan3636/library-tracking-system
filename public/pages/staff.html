<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Panel - Library System</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/staff.css">
  <script src="/js/auth-guard.js"></script>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <h1><span class="connection-status disconnected" id="connStatus"></span> Staff Panel</h1>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary btn-sm" onclick="showStaffPasswordModal()">Change Password</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="counter-card">
      <div class="counter-label">Current Student Count</div>
      <div class="counter-value" id="studentCount">0</div>
    </div>

    <div class="table-container">
      <div class="table-header">Students Inside</div>
      <table class="staff-table">
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Student ID</th>
            <th>Entry Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr><td colspan="4" class="empty-message">No students inside yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    <div>Library Check-In/Out Tracking System</div>
    <div class="footer-right">Developed by: Muhammed Taha CAN &bull; Ilhan Sidal KARADENIZ &bull; Furkan YILMAZ</div>
  </div>

  <div class="modal-overlay hidden" id="staffPasswordModal">
    <div class="modal">
      <h2>Change Password</h2>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" id="staffCurrentPw" placeholder="Your current password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="staffNewPw" placeholder="New password (min 6 chars)">
      </div>
      <div id="staffPwResult"></div>
      <div class="form-actions">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('staffPasswordModal').classList.add('hidden')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="staffChangePassword()">Change</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/staff.js"></script>
</body>
</html>
